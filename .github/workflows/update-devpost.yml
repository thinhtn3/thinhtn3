name: Update MLH Hackathons

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Fetch MLH & Update README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch MLH data and update README
        env:
          MLH_ACCESS_TOKEN: ${{ secrets.MLH_ACCESS_TOKEN }}
        run: python .github/scripts/fetch_mlh.py

      - name: Commit and push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update MLH hackathon data [skip ci]"
            git push
          fi
